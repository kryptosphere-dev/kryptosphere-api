version: '3.8'

services:
  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: kryptosphere
      POSTGRES_PASSWORD: kryptosphere
      POSTGRES_DB: kryptosphere
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
